name: Build APKs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.increment_version.outputs.new_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Get current version
        id: version
        run: |
          # Get the current version from gradle.properties
          if grep -q "^VERSION_NAME=" gradle.properties; then
            CURRENT_VERSION=$(grep "^VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          else
            CURRENT_VERSION="1.0.0"
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Increment version
        id: increment_version
        run: |
          CURRENT=${{ steps.version.outputs.current_version }}
          
          # Split version into parts
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT"
          
          MAJOR="${VERSION_PARTS[0]:-1}"
          MINOR="${VERSION_PARTS[1]:-0}"
          PATCH="${VERSION_PARTS[2]:-0}"
          
          # Increment patch version
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Update gradle.properties
          if grep -q "^VERSION_NAME=" gradle.properties; then
            sed -i "s/^VERSION_NAME=.*/VERSION_NAME=$NEW_VERSION/" gradle.properties
          else
            echo "VERSION_NAME=$NEW_VERSION" >> gradle.properties
          fi
          
          echo "Version incremented: $CURRENT -> $NEW_VERSION"

      - name: Update app versionCode and versionName
        run: |
          CURRENT=${{ steps.increment_version.outputs.new_version }}
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT"
          MAJOR="${VERSION_PARTS[0]:-1}"
          MINOR="${VERSION_PARTS[1]:-0}"
          PATCH="${VERSION_PARTS[2]:-0}"
          
          # versionCode = MAJOR * 10000 + MINOR * 100 + PATCH
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          
          # Update versionCode and versionName in app/build.gradle.kts
          sed -i "s/versionCode[[:space:]]*=.*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$CURRENT\"/" app/build.gradle.kts
          
          echo "Version code: $VERSION_CODE"
          echo "Version name: $CURRENT"

      # Optional: a committed debug keystore so debug APKs from CI are
      # update-compatible with each other (and with whatever was previously
      # installed). Without it, AGP auto-generates a random debug keystore
      # per run and Android will refuse cross-build updates.
      - name: Decode debug keystore (optional)
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            mkdir -p ~/.android
            echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
            echo "Using committed debug keystore"
          else
            echo "No DEBUG_KEYSTORE_BASE64 secret set — runner will generate a fresh debug keystore (debug APKs won't update across runs)"
          fi

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.increment_version.outputs.new_version }}
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ steps.increment_version.outputs.new_version }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Commit version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add gradle.properties app/build.gradle.kts
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.increment_version.outputs.new_version }} [skip ci]"
          git push

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-${{ needs.build.outputs.new_version }}
          path: ./apk

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk-${{ needs.build.outputs.new_version }}
          path: ./apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          name: Release v${{ needs.build.outputs.new_version }}
          draft: false
          generate_release_notes: true
          files: |
            ./apk/app-release.apk
            ./apk/app-debug.apk